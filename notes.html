<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Notes | BCANotes</title>

  <meta 
    name="description" 
    content="Read BCA notes - premium coding & computer applications study platform." 
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/notes.css" />
</head>

<body data-page="notes">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">

      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">💻</div>
        BCANotes
      </a>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>

      <div class="search-wrap">

        <div class="nav-search">
          <span class="nav-search-icon">🔍</span>

          <input 
            type="text"
            id="nav-search-input"
            placeholder="Search notes…"
            autocomplete="off"
          />
        </div>

        <div id="search-results"></div>
      </div>
    </div>
  </nav>

  <!-- Breadcrumb -->
  <div style="max-width:1200px;margin:0 auto;padding:16px 20px 0">

    <div class="breadcrumb" id="breadcrumb"></div>

  </div>

  <!-- Notes Layout -->
  <div class="notes-layout">

    <!-- Sidebar TOC -->
    <aside class="notes-toc">

      <div class="toc-title">
        📋 On This Page
      </div>

      <ul class="toc-list" id="toc-list"></ul>

    </aside>

    <!-- Main Content -->
    <main class="notes-content-wrap">

      <!-- Notes Header -->
      <div class="notes-header-card">

        <div class="notes-meta" id="notes-meta"></div>

        <div class="notes-title" id="notes-title">
          Loading…
        </div>

        <div class="notes-actions">

          <div class="lang-toggle">
            <button class="lang-btn active" id="lang-en">
              🇬🇧 English
            </button>

            <button class="lang-btn" id="lang-hi">
              🇮🇳 हिंदी
            </button>
          </div>

          <a 
            href="javascript:history.back()" 
            class="btn btn-ghost btn-sm"
          >
            ← Back
          </a>

        </div>
      </div>

      <!-- Notes Body -->
      <div class="notes-body glass-card" id="notes-body">

        <div class="notes-loading">

          <div class="spinner"></div>

          <div class="loading-text">
            Loading notes…
          </div>

        </div>

      </div>

      <!-- Prev / Next Unit -->
      <div 
        id="unit-nav"
        style="
          display:flex;
          gap:10px;
          margin-top:16px;
          flex-wrap:wrap
        ">
      </div>

    </main>
  </div>

  <!-- Image Modal -->
  <div class="img-modal" id="img-modal">

    <button class="img-modal-close" id="img-modal-close">
      ✕
    </button>

    <img src="" alt="Zoomed" />

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>
      © 2026 BCANotes · 
      <a href="index.html">Home</a>
    </p>
  </footer>

  <div class="toast"></div>

  <!-- MARKED JS -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <script>
    // Backup CDN
    if (typeof marked === 'undefined') {

      var s = document.createElement('script');

      s.src =
        'https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js';

      document.head.appendChild(s);
    }
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Main Notes Script -->
  <script src="js/notes.js"></script>

  <!-- Custom BCA Logic -->
  <script>

    document.addEventListener('DOMContentLoaded', () => {

      const p =
        new URLSearchParams(location.search);

      const sem =
        p.get('sem') || '1';

      const subject =
        decodeURIComponent(
          p.get('subject') || 'Programming With C'
        );

      const note =
        p.get('note') || 'unit1';

      const unitNum =
        parseInt(note.replace('unit', '')) || 1;

      // SUBJECT LIST

      const semesterSubjects = {

        1: [
          'Fundamentals Of Computers',
          'Mathematics For Computing',
          'Programming With C',
          'Digital Logic',
          'C Programming Laboratory',
          'Office Tools Laboratory',
          'General English',
          'Programming Fundamentals'
        ],

        2: [
          'Multimedia Tools',
          'Object Oriented Programming with C++',
          'Data Structure And Algorithms',
          'System Analysis and Design',
          'C++ Laboratory',
          'DSA Laboratory',
          'General Hindi',
          'Hardware and Networking'
        ],

        3: [
          'Database Management System',
          'Computer Networks',
          'Introduction to JAVA Programming',
          'Computer Graphics',
          'DBMS Laboratory',
          'Java Laboratory'
        ],

        4: [
          'Introduction to Internet Technology',
          'Operating System',
          'Introduction to Python Programming',
          'Client Server Computing',
          'Python Programming Laboratory',
          'Internet Technology Laboratory'
        ],

        5: [
          'Artificial Intelligence and Machine Learning',
          'Design and Analysis of Algorithms',
          'Computer System Architecture',
          'Compiler Design',
          'Software Engineering',
          'Linux Operating System',
          'Mobile Application Development',
          'R Programming',
          'Mobile App Development Laboratory',
          'R Programming Laboratory',
          'Seminar'
        ],

        6: [
          'Data Science',
          'Computer Oriented Statistical Techniques',
          'Web Programming Using C#',
          'VB.NET',
          'Cyber Security',
          'Principles of Management',
          'Cloud Computing',
          'Introduction to IoT',
          'Web Programming Laboratory',
          'VB.NET Laboratory',
          'Minor Project'
        ]

      };

      // PAGE TITLE

      document.title =
        `${subject} | BCANotes`;

      // NOTES HEADER

      const notesTitle =
        document.getElementById('notes-title');

      if (notesTitle) {
        notesTitle.textContent =
          `${subject} - Unit ${unitNum}`;
      }

      // META INFO

      const notesMeta =
        document.getElementById('notes-meta');

      if (notesMeta) {

        notesMeta.innerHTML = `
          Semester ${sem} • 
          ${subject} • 
          Unit ${unitNum}
        `;
      }

      // BREADCRUMB

      const breadcrumb =
        document.getElementById('breadcrumb');

      if (breadcrumb) {

        breadcrumb.innerHTML = `
          <a href="index.html">Home</a>
          /
          <a href="semester.html?sem=${sem}">
            Semester ${sem}
          </a>
          /
          <a href="subject.html?sem=${sem}&subject=${encodeURIComponent(subject)}">
            ${subject}
          </a>
          /
          Unit ${unitNum}
        `;
      }

      // PREV / NEXT UNIT NAVIGATION

      const nav =
        document.getElementById('unit-nav');

      if (!nav) return;

      // PREVIOUS UNIT

      if (unitNum > 1) {

        const a =
          document.createElement('a');

        a.href =
          `notes.html?sem=${sem}&subject=${encodeURIComponent(subject)}&note=unit${unitNum - 1}`;

        a.className =
          'btn btn-ghost';

        a.innerHTML =
          `← Unit ${unitNum - 1}`;

        nav.appendChild(a);
      }

      // NEXT UNIT

      if (unitNum < 5) {

        const a =
          document.createElement('a');

        a.href =
          `notes.html?sem=${sem}&subject=${encodeURIComponent(subject)}&note=unit${unitNum + 1}`;

        a.className =
          'btn btn-primary';

        a.innerHTML =
          `Unit ${unitNum + 1} →`;

        nav.appendChild(a);
      }

    });

  </script>

</body>
</html>
