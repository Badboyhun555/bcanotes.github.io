<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:#050816;
      color:white;
      position:relative;
    }

    /* Animated background */
    .bg{
      position:absolute;
      inset:0;
      background:
      radial-gradient(circle at top left,#2563eb33,transparent 30%),
      radial-gradient(circle at bottom right,#06b6d433,transparent 30%),
      radial-gradient(circle at center,#8b5cf622,transparent 35%),
      #050816;
      animation:bgMove 10s linear infinite alternate;
    }

    @keyframes bgMove{
      from{
        transform:scale(1) rotate(0deg);
      }
      to{
        transform:scale(1.1) rotate(2deg);
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:min(92%,500px);
      padding:45px 30px;
      border-radius:28px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.12);
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-6px);
      }
    }

    .emoji{
      font-size:70px;
      margin-bottom:18px;
      animation:shake 2s infinite;
    }

    @keyframes shake{
      0%,100%{
        transform:rotate(0deg);
      }
      25%{
        transform:rotate(-8deg);
      }
      75%{
        transform:rotate(8deg);
      }
    }

    h1{
      font-size:32px;
      margin-bottom:14px;
      background:linear-gradient(90deg,#3b82f6,#06b6d4);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      font-size:16px;
      margin-bottom:25px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 24px;
      border-radius:14px;
      text-decoration:none;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      color:white;
      font-weight:600;
      transition:0.3s;
      box-shadow:0 10px 25px rgba(37,99,235,0.35);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 15px 35px rgba(37,99,235,0.45);
    }

    .small{
      margin-top:20px;
      font-size:13px;
      color:#94a3b8;
    }

    .glow{
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      background:#2563eb33;
      filter:blur(90px);
      top:-100px;
      left:-100px;
      z-index:0;
    }

    .glow2{
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      background:#06b6d433;
      filter:blur(90px);
      bottom:-100px;
      right:-100px;
      z-index:0;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="card">
    <div class="emoji">🤡</div>

    <h1>Admin Access Denied</h1>

    <p>
      Sorry bhai... 😭<br><br>
      Admin itna bhi pagal nahi hai ki
      admin access tumhe de de.
    </p>

    <a href="index.html" class="btn">
      ← Back to Website
    </a>

    <div class="small">
      Nice try hacker 😎
    </div>
  </div>

</body>
</html>
